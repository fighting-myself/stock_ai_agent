version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: stock-ai-backend
    env_file:
      - .env
    ports:
      - "8001:8001"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: stock-ai-frontend
    environment:
      BACKEND_URL: http://backend:8001
    depends_on:
      - backend
    ports:
      - "6006:6006"
